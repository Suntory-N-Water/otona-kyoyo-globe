name: パイプライン実行

on:
  issues:
    types: [labeled]

defaults:
  run:
    shell: bash

permissions: {}

jobs:
  run-pipeline:
    name: パイプライン実行
    if: |
      github.event.label.name == 'run-pipeline' &&
      github.event.issue.user.login == github.repository_owner
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup

      - uses: ./.github/actions/playwright-setup

      - name: Issue本文からYouTube URLを抽出
        id: parse
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          VIDEO_URL=$(bun run src/pipeline/parse-issue-body.ts)
          echo "video_url=$VIDEO_URL" >> "$GITHUB_OUTPUT"

      - name: パイプライン実行
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          bun run src/pipeline/fetch-videos.ts "${{ steps.parse.outputs.video_url }}"
          bun run pipeline:extract
          bun run pipeline:geocode
          bun run pipeline:validate

      - name: 結果をコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/pipeline/registry/ src/data/locations.json
          git diff --staged --quiet || git commit -m "feat: パイプライン実行 (Issue #${{ github.event.issue.number }})"
          git push
